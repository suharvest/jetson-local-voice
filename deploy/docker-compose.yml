# Seeed Local Voice — production deployment.
#
# Usage:
#   LANGUAGE_MODE=en docker compose -f deploy/docker-compose.yml up -d
#   SEEED_LOCAL_VOICE_PROFILE=jetson-multilang-highperf docker compose -f deploy/docker-compose.yml up -d
#
# Models auto-download on first start (~1-2 min) and persist in a Docker volume.
# Set LANGUAGE_MODE to "zh_en" (default, Chinese+English), "en" (English only),
# or SEEED_LOCAL_VOICE_PROFILE=jetson-multilang-highperf for Qwen3 ASR/TTS.

services:
  speech:
    image: sensecraft-missionpack.seeed.cn/solution/seeed-local-voice:v3.0-slim
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.jetson
      args:
        LANGUAGE_MODE: ${LANGUAGE_MODE:-zh_en}
    # NOTE: this file covers the Jetson target. RK and Raspberry Pi run on
    # different hosts (different runtime, different volumes) and have their
    # own compose files: deploy/docker-compose.rk.yml, deploy/docker-compose.rpi.yml.
    runtime: nvidia
    ipc: host
    ports:
      - "8621:8000"
    environment:
      - LANGUAGE_MODE=${LANGUAGE_MODE:-zh_en}
      - SEEED_LOCAL_VOICE_PROFILE=${SEEED_LOCAL_VOICE_PROFILE:-}
      - SEEED_LOCAL_VOICE_PROFILE_JSON=${SEEED_LOCAL_VOICE_PROFILE_JSON:-}
      # Open-dialogue endpointing defaults. Override in .env for product tuning.
      - SEEED_LOCAL_VOICE_VAD_BACKEND=${SEEED_LOCAL_VOICE_VAD_BACKEND:-silero}
      - SEEED_LOCAL_VOICE_VAD_SILENCE_MS=${SEEED_LOCAL_VOICE_VAD_SILENCE_MS:-400}
      # Manifest + deploy script live in the sibling qwen3-edgellm-jetson repo.
      # The high-performance Qwen3 ASR streaming worker also needs the
      # deploy/audio_preprocessing assets from that repo.
      - QWEN3_EDGELLM_JETSON_ROOT=${QWEN3_EDGELLM_JETSON_ROOT:-/opt/qwen3-edgellm-jetson}
      - QWEN3_ARTIFACT_MANIFEST=${QWEN3_ARTIFACT_MANIFEST:-}
      - QWEN3_ARTIFACT_SET=${QWEN3_ARTIFACT_SET:-}
      - QWEN3_ARTIFACT_ROOT=${QWEN3_ARTIFACT_ROOT:-/opt/models/qwen3-edgellm}
      - QWEN3_HF_REPO_ID=${QWEN3_HF_REPO_ID:-}
      - QWEN3_HF_REVISION=${QWEN3_HF_REVISION:-main}
      - TTS_PROVIDER=${TTS_PROVIDER:-cuda}
      - TTS_DEFAULT_SID=${TTS_DEFAULT_SID:-0}
      - TTS_DEFAULT_SPEED=${TTS_DEFAULT_SPEED:-0.85}
      - TTS_NUM_THREADS=4
      - STREAMING_ASR_PROVIDER=cuda
      - STREAMING_ASR_NUM_THREADS=4
      - CUDA_MODULE_LOADING=LAZY
      - ORT_CUDA_ARENA_EXTEND_STRATEGY=kSameAsRequested
    volumes:
      - speech-models:/opt/models
      - type: bind
        source: ${QWEN3_EDGELLM_JETSON_HOST_ROOT:-../third_party/qwen3-edgellm-jetson}
        target: ${QWEN3_EDGELLM_JETSON_ROOT:-/opt/qwen3-edgellm-jetson}
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${QWEN3_VOICE_WORKER_HOST_DIR:-../third_party/qwen3-edgellm-jetson/native/edgellm_voice_worker/build}
        target: /opt/jv-workers
        read_only: true
        bind:
          create_host_path: false
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${SEEED_LOCAL_VOICE_MEMORY_LIMIT:-6G}

volumes:
  speech-models:
