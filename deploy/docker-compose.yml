# Jetson Voice — production deployment.
#
# Usage:
#   LANGUAGE_MODE=en docker compose -f deploy/docker-compose.yml up -d
#
# Models auto-download on first start (~1-2 min) and persist in a Docker volume.
# Set LANGUAGE_MODE to "zh_en" (default, Chinese+English) or "en" (English only).

services:
  speech:
    image: sensecraft-missionpack.seeed.cn/solution/jetson-voice:v3.0-slim
    runtime: nvidia
    ipc: host
    ports:
      - "8621:8000"
    environment:
      - LANGUAGE_MODE=${LANGUAGE_MODE:-zh_en}
      - TTS_PROVIDER=${TTS_PROVIDER:-cuda}
      - TTS_DEFAULT_SID=${TTS_DEFAULT_SID:-0}
      - TTS_DEFAULT_SPEED=${TTS_DEFAULT_SPEED:-0.85}
      - TTS_NUM_THREADS=4
      - STREAMING_ASR_PROVIDER=cuda
      - STREAMING_ASR_NUM_THREADS=4
      - CUDA_MODULE_LOADING=LAZY
      - ORT_CUDA_ARENA_EXTEND_STRATEGY=kSameAsRequested
    volumes:
      - speech-models:/opt/models
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G

volumes:
  speech-models:
