services:
  speech:
    build: .
    runtime: nvidia
    ipc: host
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - TTS_PROVIDER=cuda
      - TTS_DEFAULT_SID=3
      - SENSEVOICE_LANGUAGE=auto
      # CUDA perf: lazy module loading reduces init time & memory
      - CUDA_MODULE_LOADING=LAZY
      # ORT perf: use CUDA memory arena for fewer allocations
      - ORT_CUDA_ARENA_EXTEND_STRATEGY=kSameAsRequested
    volumes:
      - speech-models:/opt/models
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G

volumes:
  speech-models:
